<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Studies | LeadScalio</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #050505; --card-bg: #0f0f11; --accent-color: #FFDE00; --text-color: #ffffff; --border-color: #1e1e24; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-color); color: var(--text-color); padding: 100px 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .back-btn { color: var(--text-color); text-decoration: none; display: inline-block; margin-bottom: 40px; font-weight: 600; }
        .back-btn:hover { color: var(--accent-color); }
        h1 { font-size: 3rem; margin-bottom: 60px; text-align: center; text-transform: uppercase; }
        h1 span { color: var(--accent-color); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 30px; }
        .case-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 20px; padding: 30px; text-align: center; }
        .img-holder { width: 100%; aspect-ratio: 16/10; background: #1a1a1a; border-radius: 12px; margin-bottom: 20px; overflow: hidden; }
        .img-holder img { width: 100%; height: 100%; object-fit: cover; }
        @media (max-width: 767px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← Back to Home</a>
        <h1>Our <span>Case Studies</span></h1>
        
        <div class="grid">
            <div class="case-card"><h3>Case Study 1</h3><div class="img-holder"><img src="case1.png" alt="Study 1"></div></div>
            <div class="case-card"><h3>Case Study 2</h3><div class="img-holder"><img src="case2.png" alt="Study 2"></div></div>
            <div class="case-card"><h3>Case Study 3</h3><div class="img-holder"><img src="case3.png" alt="Study 3"></div></div>
            <div class="case-card"><h3>Case Study 4</h3><div class="img-holder"><img src="case4.png" alt="Study 4"></div></div>
            <div class="case-card"><h3>Case Study 5</h3><div class="img-holder"><img src="case5.png" alt="Study 5"></div></div>
            <div class="case-card"><h3>Case Study 6</h3><div class="img-holder"><img src="case6.png" alt="Study 6"></div></div>
            <div class="case-card"><h3>Case Study 7</h3><div class="img-holder"><img src="case7.png" alt="Study 7"></div></div>
            <div class="case-card"><h3>Case Study 8</h3><div class="img-holder"><img src="case8.png" alt="Study 8"></div></div>
        </div>
    </div>
</body>
</html>
